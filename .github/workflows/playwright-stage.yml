name: Playwright Stage Regression

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run stage tests
        run: npm run test:chromium:allure:stage
        env:
          CI: true

      - name: Generate Allure report and pages site
        if: always()
        run: npm run report

      - name: Save Slack data
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const dir = path.join(process.cwd(), 'allure-results');
          const files = fs.existsSync(dir)
            ? fs.readdirSync(dir).filter(f => f.endsWith('-result.json'))
            : [];

          const grouped = new Map();

          for (const file of files) {
            const filePath = path.join(dir, file);
            const json = JSON.parse(fs.readFileSync(filePath, 'utf8'));

            const key =
              json.historyId ||
              json.testCaseId ||
              json.fullName ||
              json.name ||
              file;

            if (!grouped.has(key)) {
              grouped.set(key, []);
            }

            grouped.get(key).push(json);
          }

          const stats = {
            total: 0,
            passed: 0,
            failed: 0,
            broken: 0,
            skipped: 0,
            unknown: 0,
            flaky: 0
          };

          for (const attempts of grouped.values()) {
            stats.total += 1;

            const statuses = attempts.map(a => a.status || 'unknown');
            const hasPassed = statuses.includes('passed');
            const hasFailed = statuses.includes('failed');
            const hasBroken = statuses.includes('broken');
            const hasSkipped = statuses.includes('skipped');

            // If any retry passed, final result should be treated as passed
            if (hasPassed) {
              stats.passed += 1;

              // Mark as flaky if there was a failed/broken attempt before passing
              if (hasFailed || hasBroken) {
                stats.flaky += 1;
              }
              continue;
            }

            if (hasFailed) {
              stats.failed += 1;
              continue;
            }

            if (hasBroken) {
              stats.broken += 1;
              continue;
            }

            if (hasSkipped) {
              stats.skipped += 1;
              continue;
            }

            stats.unknown += 1;
          }

          fs.writeFileSync('slack-data.json', JSON.stringify(stats, null, 2));

          if (!fs.existsSync('report-meta.json')) {
            fs.writeFileSync(
              'report-meta.json',
              JSON.stringify({ reportUrlPath: '/' }, null, 2)
            );
          }
          "

      - name: Upload Slack data artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: slack-data
          path: |
            slack-data.json
            report-meta.json
          retention-days: 1

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  notify:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Download Slack data artifact
        uses: actions/download-artifact@v5
        with:
          name: slack-data

      - name: Notify Slack
        continue-on-error: true
        run: node scripts/notify-slack-allure.js
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          ALLURE_REPORT_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

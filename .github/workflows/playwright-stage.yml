name: Playwright Stage Tests

on:
  workflow_dispatch:

jobs:
  playwright-stage:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run stage tests
        run: npm run test:chromium:allure:stage
        env:
          CI: true

      - name: Generate report
        if: always()
        run: npm run report

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-stage-report
          path: |
            playwright-report
            allure-report
            allure-results
          retention-days: 7
      - name: Notify Slack
        if: always()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"Playwright Stage Tests Finished. View results in GitHub Actions."}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
